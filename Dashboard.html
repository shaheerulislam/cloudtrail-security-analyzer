<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudTrail Security Dashboard</title>
<style>
  :root {
    --bg: #0b0e11;
    --bg-panel: #11161b;
    --bg-panel-raised: #161c23;
    --border: #232b33;
    --border-bright: #2f3a44;
    --text: #d7dde3;
    --text-dim: #7c8a96;
    --text-faint: #4a5760;
    --accent-amber: #e8a23d;
    --critical: #e0483f;
    --high: #e8a23d;
    --medium: #e0c23f;
    --low: #5b9bd5;
    --mono: 'SF Mono', 'Cascadia Code', Consolas, 'Liberation Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #3ecf6e;
    display: inline-block;
    box-shadow: 0 0 8px #3ecf6e88;
    margin-right: 4px;
  }

  .brand h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0;
  }

  .brand .sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .timestamp {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
  }

  /* ---------- Summary cards ---------- */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
  }

  .stat .label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    margin-bottom: 8px;
  }

  .stat .value {
    font-size: 28px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .stat.events .value { color: var(--text); }
  .stat.matches .value { color: var(--accent-amber); }
  .stat.incidents .value { color: var(--critical); }
  .stat.severity .value { font-size: 0; }

  .sev-bars {
    display: flex;
    gap: 6px;
    align-items: flex-end;
    height: 28px;
    margin-top: 2px;
  }

  .sev-bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    position: relative;
  }

  .sev-bar .n {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }

  /* ---------- Section headers ---------- */
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    margin: 0 0 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  section + section { margin-top: 36px; }

  /* ---------- Incident cards ---------- */
  .incident {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--critical);
    border-radius: 6px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }

  .incident-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .incident-name {
    font-size: 15px;
    font-weight: 600;
    text-transform: capitalize;
  }

  .incident-name .sep { color: var(--text-faint); font-weight: 400; }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
  }

  .badge.critical { background: #e0483f22; color: var(--critical); border: 1px solid #e0483f55; }
  .badge.high     { background: #e8a23d22; color: var(--high); border: 1px solid #e8a23d55; }
  .badge.medium   { background: #e0c23f22; color: var(--medium); border: 1px solid #e0c23f55; }
  .badge.low      { background: #5b9bd522; color: var(--low); border: 1px solid #5b9bd555; }

  .incident-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .chain {
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow-x: auto;
  }

  .chain-step {
    flex: 1;
    min-width: 150px;
    position: relative;
    padding: 10px 14px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-right: 22px;
  }

  .chain-step:last-child { margin-right: 0; }

  .chain-step::after {
    content: "→";
    position: absolute;
    right: -19px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    font-size: 14px;
  }

  .chain-step:last-child::after { content: ""; }

  .chain-step .step-num {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .chain-step .step-title {
    font-size: 12.5px;
    font-weight: 500;
    margin: 4px 0 3px;
    line-height: 1.3;
  }

  .chain-step .step-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
  }

  .no-data {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    padding: 24px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 6px;
  }

  /* ---------- Matches table ---------- */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    font-weight: 500;
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tbody tr:hover { background: var(--bg-panel); }

  .col-time { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); white-space: nowrap; }
  .col-actor { font-family: var(--mono); font-size: 12px; color: var(--accent-amber); white-space: nowrap; }
  .col-rule { font-weight: 500; }
  .col-rule .rid { display: block; font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-top: 2px; }
  .col-sev { white-space: nowrap; }

  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-faint);
    text-align: center;
  }

  @media (max-width: 700px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .timestamp { text-align: left; }
    thead { display: none; }
    table, tbody, tr, td { display: block; width: 100%; }
    tbody tr { border-bottom: 1px solid var(--border-bright); padding: 10px 0; }
    tbody td { border: none; padding: 3px 0; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div>
        <h1><span class="dot"></span>CloudTrail Security Dashboard</h1>
        <div class="sub">Detection &amp; Correlation Report</div>
      </div>
    </div>
    <div class="timestamp" id="generated-at">—</div>
  </header>

  <div class="summary" id="summary"></div>

  <section>
    <div class="section-title">Correlated Incidents</div>
    <div id="incidents"></div>
  </section>

  <section>
    <div class="section-title">Individual Rule Matches</div>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Severity</th>
          <th>Actor</th>
          <th>Rule</th>
        </tr>
      </thead>
      <tbody id="matches-body"></tbody>
    </table>
  </section>

  <footer>Generated locally from CloudTrail logs — no data leaves this machine</footer>
</div>

<script>
async function loadDashboard() {
  let data;
  try {
    const res = await fetch('dashboard_data.json');
    data = await res.json();
  } catch (e) {
    document.getElementById('summary').innerHTML =
      '<div class="no-data" style="grid-column: 1 / -1;">Could not load dashboard_data.json — make sure it is in the same folder as this HTML file, and that you are opening this via a local server (not double-clicking the file) if your browser blocks local fetches.</div>';
    return;
  }

  // Header timestamp
  const gen = new Date(data.generated_at);
  document.getElementById('generated-at').textContent =
    'Generated ' + gen.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });

  // Summary cards
  const sc = data.summary.severity_counts;
  const maxSev = Math.max(sc.critical, sc.high, sc.medium, sc.low, 1);
  const sevBar = (label, val, color) => `
    <div class="sev-bar" style="height:${Math.max(4, (val / maxSev) * 28)}px; background:${color};">
      <div class="n">${val}</div>
    </div>`;

  document.getElementById('summary').innerHTML = `
    <div class="stat events">
      <div class="label">Events Parsed</div>
      <div class="value">${data.summary.total_events}</div>
    </div>
    <div class="stat matches">
      <div class="label">Rule Matches</div>
      <div class="value">${data.summary.total_matches}</div>
    </div>
    <div class="stat incidents">
      <div class="label">Correlated Incidents</div>
      <div class="value">${data.summary.total_incidents}</div>
    </div>
    <div class="stat severity">
      <div class="label">Severity Breakdown</div>
      <div class="sev-bars">
        ${sevBar('Critical', sc.critical, 'var(--critical)')}
        ${sevBar('High', sc.high, 'var(--high)')}
        ${sevBar('Medium', sc.medium, 'var(--medium)')}
        ${sevBar('Low', sc.low, 'var(--low)')}
      </div>
    </div>
  `;

  // Incidents
  const incidentsEl = document.getElementById('incidents');
  if (data.incidents.length === 0) {
    incidentsEl.innerHTML = '<div class="no-data">No correlated multi-step incidents detected.</div>';
  } else {
    incidentsEl.innerHTML = data.incidents.map(inc => `
      <div class="incident">
        <div class="incident-head">
          <div class="incident-name">${inc.chain_name.replaceAll('_', ' ')} <span class="sep">·</span> ${inc.actor}</div>
          <span class="badge ${inc.severity}">${inc.severity}</span>
        </div>
        <div class="incident-meta">${formatTime(inc.start_time)} → ${formatTime(inc.end_time)}</div>
        <div class="chain">
          ${inc.steps.map((s, i) => `
            <div class="chain-step">
              <div class="step-num">Step ${i + 1}</div>
              <div class="step-title">${s.rule_title}</div>
              <div class="step-time">${formatTime(s.event_time)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  // Matches table
  const tbody = document.getElementById('matches-body');
  if (data.matches.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="no-data">No rule matches.</div></td></tr>';
  } else {
    tbody.innerHTML = data.matches.map(m => `
      <tr>
        <td class="col-time">${formatTime(m.event_time)}</td>
        <td class="col-sev"><span class="badge ${m.severity}">${m.severity}</span></td>
        <td class="col-actor">${m.actor}</td>
        <td class="col-rule">${m.rule_title}<span class="rid">${m.rule_id}</span></td>
      </tr>
    `).join('');
  }
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

loadDashboard();
</script>
</body>
</html>
