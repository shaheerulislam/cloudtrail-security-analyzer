id: console_login_no_mfa
title: Console Login Without MFA
description: >
  A successful console login was made without multi-factor authentication.
  Credential-only logins are far more vulnerable to compromise.
severity: high
logsource: cloudtrail
detection:
  selection:
    eventName: ConsoleLogin
    responseElements.ConsoleLogin: Success
    userIdentity.sessionContext.attributes.mfaAuthenticated: "false"
  condition: selection
tags:
  - mitre_attack:T1078
  - aws_best_practice